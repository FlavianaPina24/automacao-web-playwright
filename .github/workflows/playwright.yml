name: Automação Web - Playwright

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout do Código
      uses: actions/checkout@v4

    - name: Configurar Java 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Atualizar Cache do APT
      run: sudo apt-get update

    - name: Instalar Dependências e Navegadores (Playwright)
      run: mvn exec:java -e -D"exec.mainClass=com.microsoft.playwright.CLI" -D"exec.args=install-deps"

    - name: Executar os Testes Automatizados
      run: mvn test

    - name: Salvar Relatório Executivo HTML
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: Relatorios-ExtentReports
        path: target/Relatorio-Elegante_*.html
        retention-days: 15
