name: Automação Web - Playwright

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    # Executa todos os dias às 03:00 UTC (Meia-noite no Horário de Brasília)
    - cron: '0 3 * * *'

jobs:
  test:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout do Código
      uses: actions/checkout@v4

    - name: Configurar Java 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Cache dos Navegadores Playwright
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-playwright-

    - name: Atualizar Cache do APT
      run: sudo apt-get update

    - name: Instalar Dependências e Navegadores (Playwright)
      run: mvn exec:java -e -D"exec.mainClass=com.microsoft.playwright.CLI" -D"exec.args=install-deps"

    - name: Executar os Testes Automatizados
      run: mvn test

    - name: Salvar Relatório Executivo HTML
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: Relatorios-ExtentReports
        path: target/Relatorio-Elegante_*.html
        retention-days: 15

  security:
    name: Varredura DevSecOps (OWASP ZAP)
    runs-on: ubuntu-latest
    needs: test # Só executa se os testes funcionais passarem com sucesso
    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Executar OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: 'https://flavianapina24.github.io/meu-portfolio/'
          fail_action: false # Gera o relatório de vulnerabilidades, mas não quebra a esteira com avisos comuns do GitHub Pages
